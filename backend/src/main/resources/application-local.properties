# =============================================
# 로컬 개발 환경 설정 (spring.profiles.active=local)
# 이 파일은 Git에 포함되어도 무방한 개발용 기본값만 담는다.
# 실제 로컬 DB 비밀번호 등은 .env 또는 IDE 환경 변수로 오버라이드할 것.
# =============================================

# MySQL 로컬 연결
spring.datasource.url=jdbc:mysql://localhost:3306/marketapp?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 개발 편의: 엔티티 변경 시 스키마 자동 반영
# [운영에서 절대 사용 금지] 테이블 삭제·컬럼 변경이 예고 없이 실행될 수 있음
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =============================================
# 이메일 발송 (Gmail SMTP)
# Gmail 앱 비밀번호 발급 방법:
#   Google 계정 → 보안 → 2단계 인증 활성화 → 앱 비밀번호 생성
# .env에 MAIL_USERNAME(Gmail 주소), MAIL_PASSWORD(앱 비밀번호) 설정
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# 로컬 로그 레벨: 개발 중 SQL과 디버그 정보 확인
logging.level.root=INFO
logging.level.com.marketapp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
