# =============================================
# 운영 환경 설정 (spring.profiles.active=prod)
# 모든 민감 값(DB 접속 정보, 시크릿 키)은 환경 변수로 주입 - 절대 이 파일에 하드코딩 금지
#
# [필수 환경 변수 목록]
# DB_URL         : jdbc:mysql://prod-host:3306/marketapp?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
# DB_USERNAME    : 운영 DB 계정명
# DB_PASSWORD    : 운영 DB 비밀번호 (Secrets Manager 또는 K8s Secret으로 주입)
# JWT_SECRET     : openssl rand -base64 64 으로 생성한 키
# =============================================

# 운영 DB - 모든 값을 환경 변수에서 읽음 (PlaceholderConfigurer가 시작 시 검증)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# [운영 필수] validate: 시작 시 엔티티와 실제 스키마 불일치를 감지하여 앱 시작 실패
# 스키마 변경은 반드시 Flyway/Liquibase 마이그레이션 스크립트로 먼저 적용 후 배포
#
# 마이그레이션 가이드:
#   1. resources/db/migration/V{숫자}__{설명}.sql 파일 작성
#   2. 스테이징 DB에 먼저 적용하여 검증
#   3. 운영 배포 전 DBA 리뷰 필수
#   4. 롤백 스크립트(U{숫자}__rollback.sql)도 함께 준비
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# 운영 로그: WARN 이상만 출력, 비즈니스 로직은 INFO
logging.level.root=WARN
logging.level.com.marketapp=INFO
# SQL 쿼리 로그 비활성화 - 운영 중 SQL 노출은 보안·성능 모두 위험
logging.level.org.hibernate.SQL=WARN
