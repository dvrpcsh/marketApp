spring.application.name=marketapp

# =============================================
# 환경 프로파일 설정
# 실행: -Dspring.profiles.active=prod 또는 환경 변수 SPRING_PROFILES_ACTIVE=prod
# =============================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =============================================
# JPA 공통 설정 (ddl-auto는 각 환경 properties에서 재정의)
# =============================================
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# 서버 설정
# =============================================
server.port=${SERVER_PORT:8080}

# =============================================
# JWT 설정 - 모든 값은 환경 변수 우선, 없으면 개발용 기본값 사용
#
# [운영 필수] JWT_SECRET: Base64 인코딩된 256bit 이상 랜덤 문자열
#   생성: openssl rand -base64 64
# JWT_ACCESS_TOKEN_EXPIRY: Access Token 만료(ms). 기본 30분
# JWT_REFRESH_TOKEN_EXPIRY: Refresh Token 만료(ms). 기본 14일
# =============================================
jwt.secret=${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLWhtYWMtc2hhMjU2LWFsZ29yaXRobQ==}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:1800000}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:1209600000}
