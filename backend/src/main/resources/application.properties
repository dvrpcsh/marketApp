spring.application.name=marketapp

# =============================================
# MySQL 데이터베이스 연결 설정
# 실제 값은 application-local.properties에 분리하여 설정 (Git 미포함)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/marketapp?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate 설정
# ddl-auto=update: 개발 초기 스키마 자동 반영
# 운영 전환 시 validate 또는 none으로 반드시 변경
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# 서버 설정
# =============================================
server.port=8080
